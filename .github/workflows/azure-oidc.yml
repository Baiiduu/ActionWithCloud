name: Azure OIDC Lab

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  azure-identity:
    name: Login to Azure with GitHub OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Check required repository variables
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          test -n "${AZURE_CLIENT_ID}" || { echo "Missing repository variable AZURE_CLIENT_ID"; exit 1; }
          test -n "${AZURE_TENANT_ID}" || { echo "Missing repository variable AZURE_TENANT_ID"; exit 1; }
          test -n "${AZURE_SUBSCRIPTION_ID}" || { echo "Missing repository variable AZURE_SUBSCRIPTION_ID"; exit 1; }

      - name: Login to Azure from OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account
        shell: bash
        run: az account show --output json
