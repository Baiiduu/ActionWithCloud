name: GCP OIDC Lab

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  gcp-identity:
    name: Authenticate to GCP with GitHub OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Check required repository variables
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" || { echo "Missing repository variable GCP_WORKLOAD_IDENTITY_PROVIDER"; exit 1; }
          test -n "${GCP_SERVICE_ACCOUNT}" || { echo "Missing repository variable GCP_SERVICE_ACCOUNT"; exit 1; }

      - name: Authenticate to Google Cloud from OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Show Google Cloud auth state
        shell: bash
        run: gcloud auth list --filter=status:ACTIVE --format=json
