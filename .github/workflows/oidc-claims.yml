name: OIDC Claims Inspector

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  inspect:
    name: Inspect GitHub OIDC claims
    runs-on: ubuntu-latest

    steps:
      - name: Decode OIDC claims without printing token
        shell: bash
        run: |
          set -euo pipefail

          response="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=oidc-lab")"

          token="$(jq -r '.value' <<<"${response}")"
          echo "::add-mask::${token}"

          TOKEN="${token}" python3 - <<'PY'
          import base64
          import json
          import os

          token = os.environ["TOKEN"]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload))

          keys = [
              "iss",
              "aud",
              "sub",
              "repository",
              "repository_owner",
              "repository_id",
              "ref",
              "ref_type",
              "workflow",
              "job_workflow_ref",
              "actor",
              "event_name",
              "run_id",
              "run_attempt",
              "environment",
          ]
          print(json.dumps({key: claims.get(key) for key in keys}, indent=2))
          PY
