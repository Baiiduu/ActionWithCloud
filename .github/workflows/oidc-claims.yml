name: OIDC Claims Inspector

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  inspect:
    name: Inspect GitHub OIDC claims
    runs-on: ubuntu-latest

    steps:
      - name: Decode OIDC claims without printing token
        shell: bash
        run: |
          set -euo pipefail

          response="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=oidc-lab")"

          token="$(jq -r '.value' <<<"${response}")"
          echo "::add-mask::${token}"

          payload="$(cut -d '.' -f 2 <<<"${token}" | tr '_-' '/+')"
          padding=$(( (4 - ${#payload} % 4) % 4 ))
          payload="${payload}$(printf '=%.0s' $(seq 1 "${padding}"))"

          echo "${payload}" | base64 -d | jq '{
            iss,
            aud,
            sub,
            repository,
            repository_owner,
            repository_id,
            ref,
            ref_type,
            workflow,
            job_workflow_ref,
            actor,
            event_name,
            run_id,
            run_attempt,
            environment
          }'
